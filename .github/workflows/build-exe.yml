name: Build FlapPato Windows Executable

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
        
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pygame pyinstaller pillow  # ADICIONEI pillow
        
    - name: Build EXE with PyInstaller
      run: |
        pyinstaller --onefile `
                    --name "FlapPato_Beta.1.0" `
                    --icon "assets/pato.png" `
                    --add-data "assets;assets" `
                    --windowed `
                    --noconsole `
                    --hidden-import pygame `
                    --hidden-import PIL `
                    main.py
        
    - name: Upload EXE artifact
      uses: actions/upload-artifact@v4
      with:
        name: FlapPato_Beta.1.0_Windows
        path: dist/FlapPato_Beta.1.0.exe
