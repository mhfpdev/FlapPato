name: Build FlapPato Windows Executable

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pygame==2.5.2
        pip install pyinstaller==6.6.0
        pip install pillow==10.1.0

    - name: Converter PNG para ICO
      run: |
        python -c "from PIL import Image; img = Image.open('assets/pato.png').convert('RGBA'); img.save('assets/pato.ico', format='ICO', sizes=[(256,256),(128,128),(64,64),(32,32),(16,16)])"

    - name: Build EXE
      run: |
        pyinstaller --onefile `
                    --name "FlapPato_Beta.1.0" `
                    --add-data "assets;assets" `
                    --icon "assets/pato.ico" `
                    --windowed `
                    --noconsole `
                    --hidden-import pygame `
                    --hidden-import pygame.mixer `
                    --hidden-import pygame.font `
                    --hidden-import pygame.image `
                    --hidden-import pygame.transform `
                    main.py

    - name: Verificar build
      run: dir dist

    - name: Upload EXE
      uses: actions/upload-artifact@v4
      with:
        name: FlapPato_Beta.1.0_Windows
        path: dist/FlapPato_Beta.1.0.exe
        retention-days: 30
