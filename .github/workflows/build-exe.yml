name: Build FlapPato Windows Executable

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'  # Versão mais estável
        
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pygame==2.5.2
        pip install pyinstaller==6.6.0
        pip install pillow==10.1.0
        
    - name: Build EXE
      run: |
        pyinstaller --onefile `
                    --name "FlapPato_Beta.1.0" `
                    --add-data "assets;assets" `
                    --windowed `
                    --hidden-import pygame `
                    main.py
        
    - name: List files
      run: |
        dir dist
        
    - name: Upload EXE
      uses: actions/upload-artifact@v4
      with:
        name: FlapPato_Beta.1.0_Windows
        path: dist/FlapPato_Beta.1.0.exe
